spring:
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://qlms-auth-service
          predicates:
            - Path=/api/auth/**

        - id: inventory-service
          uri: lb://qlms-inventory-service
          predicates:
            - Path=/api/inventory/**

        - id: shipment-service
          uri: lb://qlms-shipment-service
          predicates:
            - Path=/api/shipments/**

        - id: request-service
          uri: lb://qlms-request-service
          predicates:
            - Path=/api/requests/**

        - id: notification-service
          uri: lb://qlms-notification-service
          predicates:
            - Path=/api/notifications/**